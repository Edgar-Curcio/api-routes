apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: webapp
  annotations:
    konghq.com/strip-path: "true"
spec:
  ingressClassName: kong
  rules:
  - host: api.edcurcio.com
    http:
      paths:
      - path: /webapp
        pathType: Prefix
        backend:
          service:
            name: istio-ingressgateway
            port:
              number: 80

